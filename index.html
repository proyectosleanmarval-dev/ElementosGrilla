<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividades de Grilla para Alistamiento - Sucursal Bogotá</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 30px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 35px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 500;
            letter-spacing: -0.3px;
            border-bottom: 2px solid #eef2f7;
            padding-bottom: 20px;
        }

        .subtitle {
            color: #5d6d7e;
            margin-bottom: 30px;
            font-size: 15px;
            font-weight: 400;
        }

        .filters-section {
            background: #f8fafd;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #e9ecf0;
        }

        .filters-title {
            color: #2c3e50;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            color: #4a5568;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .filter-select {
            padding: 12px 15px;
            border: 1px solid #dce4ec;
            border-radius: 6px;
            font-size: 14px;
            color: #2c3e50;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-select:hover:not(:disabled) {
            border-color: #a0b8cc;
        }

        .filter-select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.1);
        }

        .filter-select:disabled {
            background-color: #f5f7fa;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .filter-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 10px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: #2c3e50;
            color: white;
        }

        .btn-primary:hover {
            background: #1e2b37;
        }

        .btn-secondary {
            background: white;
            color: #2c3e50;
            border: 1px solid #dce4ec;
        }

        .btn-secondary:hover {
            background: #f8fafd;
            border-color: #a0b8cc;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            font-size: 14px;
            border: 1px solid #dce4ec;
            border-radius: 6px;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .search-input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.1);
        }

        .excel-container {
            overflow-x: auto;
            overflow-y: auto;
            margin-top: 20px;
            border-radius: 8px;
            border: 1px solid #e9ecf0;
            max-height: 550px;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            font-size: 13px;
            min-width: 1000px;
        }

        th {
            background: #2c3e50;
            color: white;
            font-weight: 500;
            padding: 16px 15px;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 10;
            white-space: nowrap;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eef2f7;
            color: #3a4a5a;
            white-space: nowrap;
        }

        tr:hover {
            background-color: #f8fafd;
        }

        tr:nth-child(even) {
            background-color: #fcfdff;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #5d6d7e;
        }

        .spinner {
            display: inline-block;
            width: 35px;
            height: 35px;
            margin-top: 20px;
            border: 3px solid #eef2f7;
            border-top: 3px solid #2c3e50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 60px;
            color: #c0392b;
            background: #fdf3f2;
            border-radius: 8px;
            margin: 20px 0;
        }

        .stats {
            margin-top: 20px;
            padding: 15px 20px;
            background: #f8fafd;
            border-radius: 8px;
            color: #2c3e50;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid #e9ecf0;
        }

        .stats-left {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .stat-item {
            color: #5d6d7e;
        }

        .stat-value {
            font-weight: 600;
            color: #2c3e50;
            margin-left: 5px;
        }

        .export-section {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .export-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .export-btn:hover {
            background: #219a52;
        }

        .export-info {
            font-size: 12px;
            color: #7f8c8d;
            background: #ecf0f1;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 8px 14px;
            border: 1px solid #dce4ec;
            background: white;
            color: #2c3e50;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            min-width: 38px;
        }

        .page-btn:hover:not(:disabled) {
            background: #f8fafd;
            border-color: #a0b8cc;
        }

        .page-btn.active {
            background: #2c3e50;
            color: white;
            border-color: #2c3e50;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .rows-per-page {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #5d6d7e;
            font-size: 13px;
        }

        .rows-select {
            padding: 6px 10px;
            border: 1px solid #dce4ec;
            border-radius: 6px;
            font-size: 13px;
            color: #2c3e50;
            background: white;
            cursor: pointer;
        }

        .file-info {
            display: inline-block;
            padding: 4px 12px;
            background: #eef2f7;
            border-radius: 20px;
            color: #2c3e50;
            font-size: 12px;
        }
    </style>
    <!-- Librerías necesarias -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Actividades de grilla para alistamiento, Sucursal Bogotá</h1>
        <div class="subtitle">
            Visualización de datos - Hoja1
            <span class="file-info" id="fileInfo">Cargando archivo...</span>
        </div>
        
        <!-- Filtros específicos -->
        <div class="filters-section">
            <div class="filters-title">Filtros de búsqueda</div>
            <div class="filters-grid">
                <div class="filter-group">
                    <label for="filterProyecto">PROYECTO</label>
                    <select id="filterProyecto" class="filter-select" onchange="onProyectoChange()">
                        <option value="">Todos los proyectos</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="filterActividad">ACTIVIDAD ALISTAMIENTO</label>
                    <select id="filterActividad" class="filter-select" onchange="onActividadChange()">
                        <option value="">Todas las actividades</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="filterComponente">COMPONENTE</label>
                    <select id="filterComponente" class="filter-select">
                        <option value="">Todos los componentes</option>
                    </select>
                </div>
            </div>
            
            <div class="filter-actions">
                <button class="btn btn-secondary" onclick="clearFilters()">Limpiar filtros</button>
                <button class="btn btn-primary" onclick="applyFilters()">Aplicar filtros</button>
            </div>
        </div>
        
        <!-- Búsqueda global -->
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="Búsqueda general en todos los campos...">
        </div>
        
        <div id="excelContent">
            <div class="loading">
                <div>Cargando archivo Excel...</div>
                <div class="spinner"></div>
            </div>
        </div>
        
        <div class="stats" id="stats" style="display: none;">
            <div class="stats-left">
                <div class="stat-item">Registros: <span class="stat-value" id="rowCount"></span></div>
                <div class="stat-item">Columnas: <span class="stat-value" id="columnCount"></span></div>
                <div class="stat-item">Filtros: <span class="stat-value" id="filterStatus">Sin filtros</span></div>
            </div>
            <div class="export-section">
                <div class="export-info" id="exportInfo">
                    <span id="exportCount"></span>
                </div>
                <button class="export-btn" onclick="exportToExcel()">
                    <span>📊</span> Exportar a Excel
                </button>
                <div class="rows-per-page">
                    <span>Filas por página:</span>
                    <select id="rowsPerPage" class="rows-select" onchange="changeRowsPerPage()">
                        <option value="10">10</option>
                        <option value="20" selected>20</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                        <option value="all">Todas</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        let workbook = null;
        let allData = [];
        let headers = [];
        let currentPage = 1;
        let rowsPerPage = 20;
        let filteredData = [];
        
        // Datos originales para filtros dependientes
        let uniqueValues = {
            proyectos: [],
            actividades: [],
            componentes: []
        };
        
        // Relaciones para filtros dependientes
        let proyectoActividades = new Map(); // Proyecto -> Set de actividades
        let proyectoComponentes = new Map(); // Proyecto -> Set de componentes
        let actividadComponentes = new Map(); // Actividad -> Set de componentes
        
        // Mapeo de índices de columnas
        let columnIndices = {
            proyecto: -1,
            actividad: -1,
            componente: -1
        };

        // Cargar el archivo Excel directamente
        async function loadExcel() {
            try {
                const response = await fetch('ActividadesAlistamientoBogota.xlsx');
                if (!response.ok) {
                    throw new Error('No se pudo encontrar el archivo ActividadesAlistamientoBogota.xlsx');
                }
                
                const arrayBuffer = await response.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                
                // Leer el workbook completo
                workbook = XLSX.read(data, {type: 'array'});
                
                // Cargar solo la Hoja1
                if (workbook.SheetNames.includes('Hoja1')) {
                    loadSheet('Hoja1');
                } else {
                    // Si no existe Hoja1, cargar la primera hoja disponible
                    loadSheet(workbook.SheetNames[0]);
                }
                
                document.getElementById('fileInfo').textContent = `✓ Archivo cargado: ${workbook.SheetNames.length} hoja(s) disponible(s)`;
                
            } catch (error) {
                console.error('Error:', error);
                showError('Error al cargar el archivo Excel. Asegúrate de que el archivo "ActividadesAlistamientoBogota.xlsx" existe en la raíz del repositorio.');
                document.getElementById('fileInfo').textContent = '✗ Error al cargar';
            }
        }

        function loadSheet(sheetName) {
            if (!workbook) return;
            
            try {
                const worksheet = workbook.Sheets[sheetName];
                if (!worksheet) {
                    showError(`No se encontró la hoja "${sheetName}"`);
                    return;
                }
                
                // Convertir la hoja a JSON (array de arrays)
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { 
                    header: 1,
                    defval: '',
                    blankrows: false
                });
                
                if (jsonData.length > 0) {
                    headers = jsonData[0] || [];
                    allData = jsonData.slice(1).filter(row => row.some(cell => cell !== '' && cell !== null && cell !== undefined));
                    
                    // Identificar índices de las columnas
                    headers.forEach((header, index) => {
                        const headerStr = (header || '').toString().toUpperCase().trim();
                        if (headerStr.includes('PROYECTO')) {
                            columnIndices.proyecto = index;
                        } else if (headerStr.includes('ACTIVIDAD') && headerStr.includes('ALISTAMIENTO')) {
                            columnIndices.actividad = index;
                        } else if (headerStr.includes('COMPONENTE')) {
                            columnIndices.componente = index;
                        }
                    });
                    
                    // Construir relaciones para filtros dependientes
                    buildDependentFilters();
                    
                    filteredData = [...allData];
                    
                    // Poblar los filtros iniciales
                    populateFilters();
                    
                    currentPage = 1;
                    displayData();
                    updateStats();
                    
                } else {
                    showError(`La hoja "${sheetName}" está vacía`);
                }
                
            } catch (error) {
                console.error('Error al cargar hoja:', error);
                showError(`Error al procesar la hoja "${sheetName}"`);
            }
        }

        function buildDependentFilters() {
            // Limpiar maps
            proyectoActividades.clear();
            proyectoComponentes.clear();
            actividadComponentes.clear();
            
            // Sets para valores únicos
            const proyectosSet = new Set();
            const actividadesSet = new Set();
            const componentesSet = new Set();
            
            allData.forEach(row => {
                const proyecto = row[columnIndices.proyecto] ? row[columnIndices.proyecto].toString().trim() : '';
                const actividad = row[columnIndices.actividad] ? row[columnIndices.actividad].toString().trim() : '';
                const componente = row[columnIndices.componente] ? row[columnIndices.componente].toString().trim() : '';
                
                // Agregar a sets de valores únicos
                if (proyecto) proyectosSet.add(proyecto);
                if (actividad) actividadesSet.add(actividad);
                if (componente) componentesSet.add(componente);
                
                // Construir relaciones Proyecto -> Actividades
                if (proyecto && actividad) {
                    if (!proyectoActividades.has(proyecto)) {
                        proyectoActividades.set(proyecto, new Set());
                    }
                    proyectoActividades.get(proyecto).add(actividad);
                }
                
                // Construir relaciones Proyecto -> Componentes
                if (proyecto && componente) {
                    if (!proyectoComponentes.has(proyecto)) {
                        proyectoComponentes.set(proyecto, new Set());
                    }
                    proyectoComponentes.get(proyecto).add(componente);
                }
                
                // Construir relaciones Actividad -> Componentes
                if (actividad && componente) {
                    if (!actividadComponentes.has(actividad)) {
                        actividadComponentes.set(actividad, new Set());
                    }
                    actividadComponentes.get(actividad).add(componente);
                }
            });
            
            // Convertir a arrays ordenados
            uniqueValues.proyectos = Array.from(proyectosSet).sort();
            uniqueValues.actividades = Array.from(actividadesSet).sort();
            uniqueValues.componentes = Array.from(componentesSet).sort();
        }

        function populateFilters() {
            // Poblar select de Proyectos (siempre todos)
            const selectProyecto = document.getElementById('filterProyecto');
            selectProyecto.innerHTML = '<option value="">Todos los proyectos</option>';
            uniqueValues.proyectos.forEach(value => {
                const option = document.createElement('option');
                option.value = value;
                option.textContent = value;
                selectProyecto.appendChild(option);
            });
            
            // Inicialmente, todos los filtros están habilitados con todas las opciones
            updateDependentFilters();
        }

        function updateDependentFilters() {
            const selectedProyecto = document.getElementById('filterProyecto').value;
            const selectedActividad = document.getElementById('filterActividad').value;
            
            const selectActividad = document.getElementById('filterActividad');
            const selectComponente = document.getElementById('filterComponente');
            
            // Actualizar filtro de Actividades basado en el Proyecto seleccionado
            if (selectedProyecto) {
                // Filtrar actividades por proyecto
                const actividadesDelProyecto = proyectoActividades.get(selectedProyecto) || new Set();
                const actividadesArray = Array.from(actividadesDelProyecto).sort();
                
                selectActividad.innerHTML = '<option value="">Todas las actividades</option>';
                actividadesArray.forEach(value => {
                    const option = document.createElement('option');
                    option.value = value;
                    option.textContent = value;
                    if (selectedActividad === value) {
                        option.selected = true;
                    }
                    selectActividad.appendChild(option);
                });
                selectActividad.disabled = false;
            } else {
                // Si no hay proyecto seleccionado, mostrar todas las actividades
                selectActividad.innerHTML = '<option value="">Todas las actividades</option>';
                uniqueValues.actividades.forEach(value => {
                    const option = document.createElement('option');
                    option.value = value;
                    option.textContent = value;
                    if (selectedActividad === value) {
                        option.selected = true;
                    }
                    selectActividad.appendChild(option);
                });
                selectActividad.disabled = false;
            }
            
            // Actualizar filtro de Componentes basado en Proyecto y Actividad
            updateComponentesFilter(selectedProyecto, selectedActividad);
        }

        function updateComponentesFilter(proyecto, actividad) {
            const selectComponente = document.getElementById('filterComponente');
            const currentComponente = document.getElementById('filterComponente').value;
            
            let componentesArray = [];
            
            if (actividad) {
                // Si hay actividad seleccionada, filtrar componentes por actividad
                const componentesDeActividad = actividadComponentes.get(actividad) || new Set();
                componentesArray = Array.from(componentesDeActividad).sort();
            } else if (proyecto) {
                // Si solo hay proyecto, filtrar componentes por proyecto
                const componentesDeProyecto = proyectoComponentes.get(proyecto) || new Set();
                componentesArray = Array.from(componentesDeProyecto).sort();
            } else {
                // Si no hay filtros, mostrar todos los componentes
                componentesArray = uniqueValues.componentes;
            }
            
            selectComponente.innerHTML = '<option value="">Todos los componentes</option>';
            componentesArray.forEach(value => {
                const option = document.createElement('option');
                option.value = value;
                option.textContent = value;
                if (currentComponente === value) {
                    option.selected = true;
                }
                selectComponente.appendChild(option);
            });
        }

        function onProyectoChange() {
            // Cuando cambia el proyecto, resetear actividad y componente si es necesario
            const selectActividad = document.getElementById('filterActividad');
            const selectComponente = document.getElementById('filterComponente');
            
            // Resetear actividad si el proyecto actual no tiene la actividad seleccionada
            const selectedProyecto = document.getElementById('filterProyecto').value;
            const selectedActividad = selectActividad.value;
            
            if (selectedProyecto && selectedActividad) {
                const actividadesDelProyecto = proyectoActividades.get(selectedProyecto) || new Set();
                if (!actividadesDelProyecto.has(selectedActividad)) {
                    selectActividad.value = ''; // Resetear actividad si no pertenece al proyecto
                }
            }
            
            updateDependentFilters();
        }

        function onActividadChange() {
            // Cuando cambia la actividad, actualizar componentes
            const selectedProyecto = document.getElementById('filterProyecto').value;
            const selectedActividad = document.getElementById('filterActividad').value;
            
            updateComponentesFilter(selectedProyecto, selectedActividad);
        }

        function applyFilters() {
            const proyectoFilter = document.getElementById('filterProyecto').value;
            const actividadFilter = document.getElementById('filterActividad').value;
            const componenteFilter = document.getElementById('filterComponente').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            
            filteredData = allData.filter(row => {
                // Aplicar filtros específicos
                if (proyectoFilter && columnIndices.proyecto !== -1) {
                    const rowValue = row[columnIndices.proyecto] ? row[columnIndices.proyecto].toString() : '';
                    if (rowValue !== proyectoFilter) return false;
                }
                
                if (actividadFilter && columnIndices.actividad !== -1) {
                    const rowValue = row[columnIndices.actividad] ? row[columnIndices.actividad].toString() : '';
                    if (rowValue !== actividadFilter) return false;
                }
                
                if (componenteFilter && columnIndices.componente !== -1) {
                    const rowValue = row[columnIndices.componente] ? row[columnIndices.componente].toString() : '';
                    if (rowValue !== componenteFilter) return false;
                }
                
                // Aplicar búsqueda general
                if (searchTerm) {
                    return row.some(cell => {
                        if (cell === null || cell === undefined) return false;
                        return cell.toString().toLowerCase().includes(searchTerm);
                    });
                }
                
                return true;
            });
            
            currentPage = 1;
            displayData();
            updateStats();
        }

        function clearFilters() {
            document.getElementById('filterProyecto').value = '';
            document.getElementById('filterActividad').innerHTML = '<option value="">Todas las actividades</option>';
            document.getElementById('filterComponente').innerHTML = '<option value="">Todos los componentes</option>';
            document.getElementById('searchInput').value = '';
            
            // Restaurar todos los filtros
            updateDependentFilters();
            
            filteredData = [...allData];
            currentPage = 1;
            displayData();
            updateStats();
        }

        function displayData() {
            const container = document.getElementById('excelContent');
            
            if (!filteredData || filteredData.length === 0) {
                container.innerHTML = '<div class="error">No se encontraron datos con los filtros aplicados</div>';
                document.getElementById('stats').style.display = 'none';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            // Calcular paginación
            const rowsPerPageValue = document.getElementById('rowsPerPage').value;
            const rowsPerPage = rowsPerPageValue === 'all' ? filteredData.length : parseInt(rowsPerPageValue);
            
            const startIndex = (currentPage - 1) * rowsPerPage;
            const endIndex = Math.min(startIndex + rowsPerPage, filteredData.length);
            const pageData = filteredData.slice(startIndex, endIndex);
            
            // Crear tabla
            let tableHTML = '<div class="excel-container"><table><thead><tr>';
            
            // Encabezados
            headers.forEach(header => {
                const headerText = header && header.toString().trim() !== '' ? header : 'Columna';
                tableHTML += `<th>${headerText}</th>`;
            });
            tableHTML += '</tr></thead><tbody>';
            
            // Datos
            pageData.forEach(row => {
                tableHTML += '<tr>';
                // Asegurar que todas las filas tengan el mismo número de columnas
                const rowData = [...row];
                while (rowData.length < headers.length) {
                    rowData.push('');
                }
                
                rowData.forEach(cell => {
                    const value = cell !== undefined && cell !== null ? cell : '';
                    tableHTML += `<td>${value}</td>`;
                });
                tableHTML += '</tr>';
            });
            
            tableHTML += '</tbody></table></div>';
            
            container.innerHTML = tableHTML;
            
            // Mostrar estadísticas
            document.getElementById('stats').style.display = 'flex';
            
            // Actualizar paginación
            updatePagination(rowsPerPage);
        }

        function updatePagination(rowsPerPage) {
            const totalPages = Math.ceil(filteredData.length / rowsPerPage);
            const paginationDiv = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }
            
            let paginationHTML = '';
            
            // Botón anterior
            paginationHTML += `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>Anterior</button>`;
            
            // Números de página
            const maxButtons = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);
            
            if (endPage - startPage + 1 < maxButtons) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }
            
            if (startPage > 1) {
                paginationHTML += `<button class="page-btn" onclick="changePage(1)">1</button>`;
                if (startPage > 2) {
                    paginationHTML += `<span class="page-btn" style="border: none; background: none;">...</span>`;
                }
            }
            
            for (let i = startPage; i <= endPage; i++) {
                paginationHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }
            
            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    paginationHTML += `<span class="page-btn" style="border: none; background: none;">...</span>`;
                }
                paginationHTML += `<button class="page-btn" onclick="changePage(${totalPages})">${totalPages}</button>`;
            }
            
            // Botón siguiente
            paginationHTML += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Siguiente</button>`;
            
            paginationDiv.innerHTML = paginationHTML;
        }

        function changePage(page) {
            currentPage = page;
            displayData();
        }

        function changeRowsPerPage() {
            currentPage = 1;
            displayData();
        }

        function updateStats() {
            document.getElementById('rowCount').textContent = `${filteredData.length} de ${allData.length}`;
            document.getElementById('columnCount').textContent = headers.length;
            document.getElementById('exportCount').textContent = `Exportando: ${filteredData.length} registros`;
            
            // Actualizar estado de filtros
            const proyectoFilter = document.getElementById('filterProyecto').value;
            const actividadFilter = document.getElementById('filterActividad').value;
            const componenteFilter = document.getElementById('filterComponente').value;
            const searchTerm = document.getElementById('searchInput').value;
            
            const activeFilters = [];
            if (proyectoFilter) activeFilters.push('Proyecto');
            if (actividadFilter) activeFilters.push('Actividad');
            if (componenteFilter) activeFilters.push('Componente');
            if (searchTerm) activeFilters.push('Búsqueda');
            
            document.getElementById('filterStatus').textContent = activeFilters.length > 0 ? 
                activeFilters.join(', ') : 'Sin filtros';
        }

        function showError(message) {
            const container = document.getElementById('excelContent');
            container.innerHTML = `<div class="error">${message}</div>`;
            document.getElementById('stats').style.display = 'none';
            document.getElementById('pagination').innerHTML = '';
        }

        // Evento de búsqueda con debounce
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', function(e) {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                applyFilters();
            }, 300);
        });

        // Función para exportar a Excel
        function exportToExcel() {
            if (filteredData.length === 0) {
                alert('No hay datos para exportar');
                return;
            }
            
            try {
                // Preparar los datos para exportar
                const exportHeaders = headers.map(h => h || 'Columna');
                const exportData = [exportHeaders, ...filteredData];
                
                // Crear una nueva hoja de trabajo
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(exportData);
                
                // Ajustar el ancho de las columnas
                const colWidths = [];
                headers.forEach((header, index) => {
                    let maxLength = header ? header.toString().length : 10;
                    filteredData.forEach(row => {
                        if (row[index] !== undefined && row[index] !== null) {
                            maxLength = Math.max(maxLength, row[index].toString().length);
                        }
                    });
                    colWidths.push({ wch: Math.min(Math.max(maxLength, 10), 50) });
                });
                ws['!cols'] = colWidths;
                
                // Agregar la hoja al libro
                XLSX.utils.book_append_sheet(wb, ws, 'Hoja1');
                
                // Generar nombre del archivo
                const now = new Date();
                const dateStr = `${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}_${now.getHours().toString().padStart(2,'0')}${now.getMinutes().toString().padStart(2,'0')}`;
                
                let exportType = 'todos';
                if (filteredData.length < allData.length) {
                    exportType = 'filtrados';
                }
                
                const fileName = `Actividades_Alistamiento_Bogota_${exportType}_${dateStr}.xlsx`;
                
                // Exportar el archivo
                XLSX.writeFile(wb, fileName);
                
                alert(`Archivo Excel generado exitosamente con ${filteredData.length} registros`);
                
            } catch (error) {
                console.error('Error al exportar:', error);
                alert('Error al generar el archivo Excel. Por favor intente nuevamente.');
            }
        }

        // Iniciar carga
        window.addEventListener('load', loadExcel);
    </script>
</body>
</html>
